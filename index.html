<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>rei_plugins — ExteraGram Plugin Hub</title>
<meta name="description" content="Кастомные плагины для ExteraGram и AyuGram от @rei_plugins">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Fira+Code:wght@300;400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--bg2:#0d0d18;--bg3:#12121f;--surface:#16162a;
  --border:rgba(255,255,255,0.07);
  --red:#e63946;--red-glow:rgba(230,57,70,0.22);
  --white:#f0eeff;--muted:#7070a0;
  --font-head:'Cinzel',serif;--font-ui:'Rajdhani',sans-serif;--font-mono:'Fira Code',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--white);font-family:var(--font-ui);overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(230,57,70,0.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(230,57,70,0.025) 1px,transparent 1px);
  background-size:60px 60px;
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px}

/* HEADER */
header{
  position:sticky;top:0;z-index:50;
  height:64px;padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(14px);background:rgba(7,7,13,0.85);
}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-hex{
  width:32px;height:32px;background:var(--red);
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--red-glow)}50%{box-shadow:0 0 0 8px transparent}}
.logo-text{font-family:var(--font-head);font-size:18px;letter-spacing:2px;color:var(--white)}
.logo-text b{color:var(--red);font-weight:inherit}
nav{display:flex;align-items:center;gap:8px}
.nav-a{
  color:var(--muted);font-family:var(--font-ui);font-size:13px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;text-decoration:none;
  padding:6px 14px;border-radius:4px;transition:all .2s;
}
.nav-a:hover{color:var(--white);background:var(--border)}
.nav-btn{
  background:var(--red);color:#fff;font-family:var(--font-ui);
  font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  text-decoration:none;padding:7px 18px;border-radius:4px;transition:opacity .2s,transform .15s;
}
.nav-btn:hover{opacity:.85;transform:translateY(-1px)}

/* HERO */
.hero{
  position:relative;z-index:1;padding:90px 40px 70px;text-align:center;overflow:hidden;
}
.hero-glow{
  position:absolute;top:-80px;left:50%;transform:translateX(-50%);
  width:700px;height:500px;pointer-events:none;
  background:radial-gradient(ellipse at center,rgba(230,57,70,0.1) 0%,transparent 65%);
}
.hero-badge{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--font-mono);font-size:11px;color:var(--red);
  letter-spacing:2px;text-transform:uppercase;
  border:1px solid var(--red);border-radius:2px;padding:4px 12px;margin-bottom:24px;
}
.hero-badge::before{content:'//';opacity:.5}
h1{
  font-family:var(--font-head);font-size:clamp(38px,6vw,76px);
  font-weight:600;letter-spacing:4px;line-height:1.08;
  background:linear-gradient(135deg,#fff 0%,var(--muted) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:18px;
}
h1 i{font-style:normal;-webkit-text-fill-color:var(--red)}
.hero-sub{font-size:17px;color:var(--muted);max-width:500px;margin:0 auto 44px;font-weight:500}
.hero-stats{
  display:flex;justify-content:center;gap:56px;
  border-top:1px solid var(--border);padding-top:40px;
}
.stat-num{font-family:var(--font-mono);font-size:30px;color:var(--red)}
.stat-lbl{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}

/* SECTION */
.section{position:relative;z-index:1;padding:60px 40px;max-width:1260px;margin:0 auto}
.sec-header{
  display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:32px;border-bottom:1px solid var(--border);padding-bottom:14px;
}
.sec-title{font-family:var(--font-head);font-size:12px;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
.sec-title span{color:var(--red);font-family:var(--font-mono);margin-right:10px}
.count-label{font-family:var(--font-mono);font-size:12px;color:var(--muted)}

/* FILTERS */
.filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:30px}
.f-btn{
  background:transparent;border:1px solid var(--border);
  color:var(--muted);font-family:var(--font-ui);font-size:12px;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;padding:5px 14px;
  border-radius:2px;cursor:pointer;transition:all .2s;
}
.f-btn:hover,.f-btn.on{border-color:var(--red);color:var(--red);background:var(--red-glow)}

/* GRID — все карточки одной высоты в ряду */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(330px,1fr));
  gap:18px;
  /* stretch выравнивает карточки по высоте внутри строки */
  align-items:stretch;
}

/* ══════════════════════════════════════════════
   CARD — ключевое: flex-column, кнопки внизу
══════════════════════════════════════════════ */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:24px;
  position:relative;overflow:hidden;

  /* flex-column + stretch = кнопки всегда на одном уровне */
  display:flex;
  flex-direction:column;

  transition:transform .25s,border-color .25s,box-shadow .25s;
  animation:fadeUp .4s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--card-clr,var(--red));opacity:0;transition:opacity .25s;
}
.card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.13);box-shadow:0 14px 40px rgba(0,0,0,.45)}
.card:hover::before{opacity:1}

/* Верхняя строка: иконка + версия/статус */
.card-top{
  display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;
  flex-shrink:0;
}
.card-ico{
  width:44px;height:44px;background:var(--bg2);border:1px solid var(--border);
  border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.card-meta{text-align:right}
.card-ver{font-family:var(--font-mono);font-size:11px;color:var(--muted);display:block;margin-bottom:5px}
.card-ver::before{content:'v';opacity:.5}
.bs{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:2px}
.s-stable{background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.25)}
.s-beta{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.25)}
.s-dev{background:rgba(56,189,248,.1);color:#38bdf8;border:1px solid rgba(56,189,248,.25)}

/* Название */
.card-name{
  font-family:var(--font-head);font-size:19px;letter-spacing:1.5px;font-weight:600;
  margin-bottom:8px;flex-shrink:0;
}

/* ── ОПИСАНИЕ: обрезается до 3 строк, раскрывается по клику ── */
.card-desc-wrap{
  position:relative;
  margin-bottom:14px;
  flex-shrink:0;
}
.card-desc{
  font-size:13.5px;color:var(--muted);line-height:1.55;
  /* Зажимаем до 3 строк */
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
  transition:max-height .3s ease;
}
.card-desc.expanded{
  display:block;
  -webkit-line-clamp:unset;
  overflow:visible;
}
.expand-btn{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:5px;
  font-family:var(--font-mono);font-size:11px;
  color:var(--red);cursor:pointer;border:none;background:none;
  padding:0;letter-spacing:.5px;
  transition:opacity .2s;
}
.expand-btn:hover{opacity:.7}
.expand-btn.hidden{display:none}

/* Теги — занимают оставшееся место, толкают кнопки вниз */
.card-tags{
  display:flex;flex-wrap:wrap;gap:5px;
  margin-bottom:18px;
  flex:1;           /* ← ключевое: растягивается, кнопки прижимаются к низу */
  align-content:flex-start;
}
.tag{
  font-family:var(--font-mono);font-size:10px;color:var(--muted);
  border:1px solid var(--border);padding:2px 8px;border-radius:2px;letter-spacing:1px;
  height:fit-content;
}

/* Кнопки — всегда внизу карточки */
.card-btns{
  display:flex;gap:8px;
  flex-shrink:0;  /* не сжимается */
  margin-top:auto; /* прижимаем к низу если теги пустые */
}
.btn-dl{
  flex:1;background:var(--red);color:#fff;border:none;
  font-family:var(--font-ui);font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  text-decoration:none;padding:10px 14px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;transition:opacity .2s;
  white-space:nowrap;
}
.btn-dl:hover{opacity:.82}
.btn-ch{
  background:transparent;color:var(--muted);
  border:1px solid var(--border);font-family:var(--font-ui);font-size:12px;font-weight:600;
  text-decoration:none;padding:10px 14px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;
  white-space:nowrap;flex-shrink:0;
}
.btn-ch:hover{border-color:var(--muted);color:var(--white)}

/* EMPTY / LOADING */
.state{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
.spinner{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.state-ico{font-size:36px;opacity:.3;display:block;margin-bottom:12px}
.state-txt{font-family:var(--font-mono);font-size:13px}

/* FOOTER */
footer{
  position:relative;z-index:1;border-top:1px solid var(--border);
  padding:28px 40px;display:flex;align-items:center;justify-content:space-between;
  color:var(--muted);font-size:12px;font-family:var(--font-mono);
}
.f-links{display:flex;gap:20px}
.f-links a{color:var(--muted);text-decoration:none;transition:color .2s}
.f-links a:hover{color:var(--red)}
.admin-link{
  position:fixed;bottom:20px;right:20px;z-index:90;
  width:38px;height:38px;background:var(--surface);border:1px solid var(--border);
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:16px;text-decoration:none;
  opacity:.2;transition:all .2s;
}
.admin-link:hover{opacity:1;border-color:var(--red);color:var(--red)}

@media(max-width:640px){
  header,footer{padding:0 16px}
  .hero{padding:52px 16px 44px}
  .section{padding:36px 16px}
  .grid{grid-template-columns:1fr}
  .hero-stats{gap:24px}
  footer{flex-direction:column;gap:14px;text-align:center}
}
</style>
</head>
<body>

<header>
  <a href="index.php" class="logo">
    <div class="logo-hex">R</div>
    <span class="logo-text">rei<b>_</b>plugins</span>
  </a>
  <nav>
    <a href="https://t.me/rei_plugins" target="_blank" class="nav-a">Channel</a>
    <a href="https://github.com" target="_blank" class="nav-a">GitHub</a>
    <a href="https://t.me/rei_plugins" target="_blank" class="nav-btn">↗ Telegram</a>
  </nav>
</header>

<div class="hero">
  <div class="hero-glow"></div>
  <div class="hero-badge">ExteraGram · AyuGram · Chaquopy</div>
  <h1>Plugin <i>Hub</i></h1>
  <p class="hero-sub">Кастомные плагины для Telegram-клиентов. Открытые, бесплатные, без регистрации.</p>
  <div class="hero-stats">
    <div class="stat"><div class="stat-num" id="stat-n">—</div><div class="stat-lbl">Плагинов</div></div>
    <div class="stat"><div class="stat-num">∞</div><div class="stat-lbl">Обновлений</div></div>
    <div class="stat"><div class="stat-num">0</div><div class="stat-lbl">Рекламы</div></div>
  </div>
</div>

<div class="section">
  <div class="sec-header">
    <div class="sec-title"><span>//</span>Плагины</div>
    <div class="count-label" id="count-lbl">загрузка...</div>
  </div>
  <div class="filters" id="filters">
    <button class="f-btn on" data-f="all">All</button>
  </div>
  <div class="grid" id="grid">
    <div class="state"><div class="spinner"></div><div class="state-txt">Загружаю плагины...</div></div>
  </div>
</div>

<footer>
  <div>rei_plugins © 2024 — <span style="color:var(--red)">@lyzos</span></div>
  <div class="f-links">
    <a href="https://t.me/rei_plugins" target="_blank">Telegram</a>
  </div>
</footer>

<a href="admin.php" class="admin-link" title="Admin">⚙</a>

<script>
let plugins = [], activeFilter = 'all';

// Лимит символов описания — если больше, показываем кнопку "..."
const DESC_LIMIT = 120;

async function load() {
  try {
    const r = await fetch('api.php');
    const j = await r.json();
    plugins = j.ok ? j.data : [];
  } catch { plugins = []; }
  render();
}

function render() {
  const filtersEl = document.getElementById('filters');
  const grid      = document.getElementById('grid');
  const allTags   = [...new Set(plugins.flatMap(p => p.tags || []))];

  filtersEl.innerHTML =
    `<button class="f-btn ${activeFilter==='all'?'on':''}" data-f="all">All</button>` +
    allTags.map(t =>
      `<button class="f-btn ${activeFilter===t?'on':''}" data-f="${t}">${t}</button>`
    ).join('');

  filtersEl.querySelectorAll('.f-btn').forEach(b =>
    b.addEventListener('click', () => { activeFilter = b.dataset.f; render(); }));

  const list = activeFilter === 'all'
    ? plugins
    : plugins.filter(p => (p.tags||[]).includes(activeFilter));

  document.getElementById('stat-n').textContent    = plugins.length;
  document.getElementById('count-lbl').textContent = `${list.length} / ${plugins.length} плагинов`;

  if (!list.length) {
    grid.innerHTML = `<div class="state"><span class="state-ico">◈</span><div class="state-txt">Нет плагинов</div></div>`;
    return;
  }

  grid.innerHTML = list.map((p, i) => {
    const tags      = (p.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
    const sc        = 's-' + (p.status||'stable');
    const desc      = p.description || '';
    const isLong    = desc.length > DESC_LIMIT;

    return `
    <div class="card" style="--card-clr:${p.color||'var(--red)'};animation-delay:${i*55}ms">
      <div class="card-top">
        <div class="card-ico">${p.icon||'⬡'}</div>
        <div class="card-meta">
          <span class="card-ver">${p.version}</span>
          <span class="bs ${sc}">${(p.status||'stable').toUpperCase()}</span>
        </div>
      </div>

      <div class="card-name">${p.name}</div>

      <div class="card-desc-wrap">
        <div class="card-desc" id="desc-${p.id}">${desc}</div>
        <button class="expand-btn ${isLong ? '' : 'hidden'}"
                id="exp-${p.id}"
                onclick="toggleDesc('${p.id}')">
          ··· ещё
        </button>
      </div>

      <div class="card-tags">${tags}</div>

      <div class="card-btns">
        <a href="${p.download_url||'#'}" target="_blank" class="btn-dl">↓ Скачать</a>
        <a href="${p.channel_url||'#'}"  target="_blank" class="btn-ch" title="Канал">↗</a>
      </div>
    </div>`;
  }).join('');
}

function toggleDesc(id) {
  const desc = document.getElementById('desc-' + id);
  const btn  = document.getElementById('exp-'  + id);
  const open = desc.classList.toggle('expanded');
  btn.textContent = open ? '↑ свернуть' : '··· ещё';
}

load();
</script>
</body>
</html>
