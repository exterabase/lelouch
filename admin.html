<script>
let plugins = [], delId = null;

const openModal  = id => document.getElementById(id).classList.add('open');
const closeModal = id => document.getElementById(id).classList.remove('open');
document.querySelectorAll('.modal-bg').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); }));
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-bg.open')
    .forEach(o => o.classList.remove('open'));
});

function flash(id, msg) {
  document.querySelectorAll('.alert.show').forEach(e => e.classList.remove('show'));
  const el = document.getElementById(id);
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}
const showOk  = m => flash('ok-bar',  '✓ ' + m);
const showErr = m => flash('err-bar', '✗ ' + m);

/* AUTH */
async function checkAuth() {
  try {
    const r = await fetch('api.php?action=check');
    const j = await r.json();
    if (j.ok && j.data.admin) showMain();
  } catch {}
}

document.getElementById('login-btn').onclick = doLogin;
document.getElementById('pw-input').onkeydown = e => { if (e.key === 'Enter') doLogin(); };

async function doLogin() {
  const pw  = document.getElementById('pw-input').value;
  const err = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  err.classList.remove('show');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const r = await fetch('api.php?action=login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw })
    });
    const j = await r.json();
    if (j.ok) { showMain(); return; }
    err.textContent = '✗ ' + (j.error || 'Ошибка'); err.classList.add('show');
  } catch {
    err.textContent = '✗ Ошибка соединения'; err.classList.add('show');
  } finally { btn.textContent = 'Войти'; btn.disabled = false; }
}

document.getElementById('logout-btn').onclick = async () => {
  await fetch('api.php?action=logout', { method: 'POST' });
  location.reload();
};

function showMain() {
  document.getElementById('login-section').style.display  = 'none';
  document.getElementById('main-section').style.display   = 'block';
  document.getElementById('logout-btn').style.display     = 'inline-flex';
  document.getElementById('adm-status').innerHTML = '<span>● online</span>';
  loadPlugins();
}

/* LOAD */
async function loadPlugins() {
  try {
    const r = await fetch('api.php');
    const j = await r.json();
    plugins = j.ok ? j.data : [];
  } catch { plugins = []; }
  renderTable();
}

function renderTable() {
  const tbody  = document.getElementById('plugin-tbody');
  const empty  = document.getElementById('empty-state');
  const tbl    = document.getElementById('plugin-table');
  document.getElementById('plugin-count-sub').textContent = plugins.length + ' плагинов в базе';

  if (!plugins.length) {
    tbl.style.display = 'none'; empty.style.display = 'block'; return;
  }
  tbl.style.display = ''; empty.style.display = 'none';

  tbody.innerHTML = plugins.map(p => {
    const sc  = 'bs-' + (p.status || 'stable');
    const tags = (p.tags||[]).map(t => `<span class="tag">${t}</span>`).join('');
    const dot  = `<span class="color-preview" style="background:${p.color||'#e63946'}"></span>`;
    return `
    <tr>
      <td><div class="tbl-ico">${p.icon||'⬡'}</div></td>
      <td>
        <div class="tbl-name">${dot}${p.name}</div>
        <div class="tbl-ver">${p.version}</div>
      </td>
      <td class="hide-mob"><div class="tbl-desc" title="${(p.description||'').replace(/"/g,'&quot;')}">${p.description||'—'}</div></td>
      <td class="hide-mob"><div class="tbl-tags">${tags||'—'}</div></td>
      <td><span class="bs ${sc}">${(p.status||'stable').toUpperCase()}</span></td>
      <td>
        <div class="tbl-actions">
          <button class="btn btn-sm btn-edit" onclick="openForm('${p.id}')">✏ Ред.</button>
          <button class="btn btn-sm btn-danger" onclick="openDel('${p.id}')">✕</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

/* FORM */
function openForm(id) {
  document.getElementById('form-err').classList.remove('show');
  const p = id ? plugins.find(x => x.id === id) : null;

  document.getElementById('form-title').textContent = p ? 'Редактировать плагин' : 'Новый плагин';
  document.getElementById('f-edit-id').value  = p?.id          || '';
  document.getElementById('f-name').value     = p?.name        || '';
  document.getElementById('f-id').value       = p?.id          || '';
  document.getElementById('f-version').value  = p?.version     || '';
  document.getElementById('f-icon').value     = p?.icon        || '';
  document.getElementById('f-color').value    = p?.color       || '#e63946';
  document.getElementById('f-status').value   = p?.status      || 'stable';
  document.getElementById('f-desc').value     = p?.description || '';
  document.getElementById('f-tags').value     = (p?.tags||[]).join(', ');
  document.getElementById('f-dl').value       = p?.download_url || '';
  document.getElementById('f-ch').value       = p?.channel_url  || '';
  document.getElementById('f-order').value    = p?.sort_order   ?? 0;

  // Auto-slug только для нового
  const nameInput = document.getElementById('f-name');
  const idInput   = document.getElementById('f-id');
  idInput.readOnly = !!id;
  idInput.style.opacity = id ? '.5' : '1';
  nameInput.oninput = !id ? () => {
    idInput.value = nameInput.value.toLowerCase()
      .replace(/\s+/g,'_').replace(/[^a-z0-9_\-]/g,'');
  } : null;

  openModal('form-modal');
}

async function savePlugin() {
  const editId = document.getElementById('f-edit-id').value;
  const ferr   = document.getElementById('form-err');
  ferr.classList.remove('show');

  const body = {
    id:           document.getElementById('f-id').value.trim(),
    name:         document.getElementById('f-name').value.trim(),
    version:      document.getElementById('f-version').value.trim(),
    description:  document.getElementById('f-desc').value.trim(),
    tags:         document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    icon:         document.getElementById('f-icon').value.trim()    || '⬡',
    color:        document.getElementById('f-color').value.trim()   || '#e63946',
    status:       document.getElementById('f-status').value,
    download_url: document.getElementById('f-dl').value.trim(),
    channel_url:  document.getElementById('f-ch').value.trim(),
    sort_order:   parseInt(document.getElementById('f-order').value) || 0,
  };

  if (!body.name || !body.id || !body.version) {
    ferr.textContent = '✗ Название, ID и версия обязательны'; ferr.classList.add('show'); return;
  }

  const isEdit = !!editId;
  const url    = isEdit ? `api.php?id=${encodeURIComponent(editId)}` : 'api.php';

  try {
    const r = await fetch(url, {
      method: isEdit ? 'PUT' : 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const j = await r.json();
    if (!j.ok) { ferr.textContent = '✗ ' + j.error; ferr.classList.add('show'); return; }
    closeModal('form-modal');
    showOk(isEdit ? `«${body.name}» обновлён` : `«${body.name}» добавлен`);
    await loadPlugins();
  } catch {
    ferr.textContent = '✗ Ошибка соединения'; ferr.classList.add('show');
  }
}

/* DELETE */
function openDel(id) {
  delId = id;
  const p = plugins.find(x => x.id === id);
  document.getElementById('del-text').textContent =
    `«${p?.name || id}» будет удалён из базы данных.`;
  document.getElementById('del-ok').onclick = confirmDel;
  openModal('del-modal');
}

async function confirmDel() {
  try {
    const r = await fetch(`api.php?id=${encodeURIComponent(delId)}`, { method: 'DELETE' });
    const j = await r.json();
    closeModal('del-modal');
    if (j.ok) { showOk('Плагин удалён'); await loadPlugins(); }
    else showErr(j.error);
  } catch { showErr('Ошибка соединения'); }
}

/* INIT */
checkAuth();
</script>
